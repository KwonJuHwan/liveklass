version: '3.8'

services:
  mysql:
    image: mysql:5.7
    container_name: liveclass_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: liveclass_logs
    ports:
      - "3307:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  grafana:
      image: grafana/grafana:latest
      container_name: liveclass_grafana
      ports:
        - "3000:3000"
      depends_on:
        - mysql